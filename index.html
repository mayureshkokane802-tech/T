<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:black;
 color:white;
 text-align:center;
 overflow:hidden;
}

/* INTRO SCREEN */
#intro{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:999;
}

#intro button{
 padding:12px 20px;
 border:none;
 background:#ff2e63;
 color:white;
 border-radius:10px;
}

/* MAIN */
.container{
 padding:20px;
 animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1; transform:translateY(0);}
}

.day-card{
 background:rgba(255,255,255,0.1);
 padding:15px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
 backdrop-filter:blur(10px);
}

img{
 width:100%;
 border-radius:10px;
}

audio{
 width:100%;
 margin-top:10px;
}

#typedText{
 font-size:16px;
 margin-top:10px;
 text-shadow:0 0 10px pink;
}

#surpriseBtn{
 margin-top:15px;
 padding:10px;
 background:#ff2e63;
 border:none;
 border-radius:10px;
 color:white;
}

/* floating hearts */
.heart{
 position:fixed;
 bottom:-10px;
 font-size:20px;
 animation:float 6s linear infinite;
}

@keyframes float{
 to{transform:translateY(-100vh);}
}

/* secret message */
#secret{
 position:fixed;
 bottom:20px;
 left:50%;
 transform:translateX(-50%);
 background:rgba(0,0,0,0.7);
 padding:10px;
 border-radius:10px;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h2>For Someone Special ❤️</h2>
<button onclick="startExperience()">Tap to Start</button>
</div>

<div id="main" style="display:none">
<h3 id="countdown"></h3>

<div class="container">
<div id="dayCard" class="day-card"></div>
</div>
</div>

<div id="secret">You are my forever ❤️</div>

<script>

const YEAR = new Date().getFullYear();

function startExperience(){
 document.getElementById("intro").style.display="none";
 document.getElementById("main").style.display="block";
 showToday();
}

// DATA
const daysData=[
 {date:"May 3", img:"photo1.jpg", song:"song1.mp3", msg:"cheers to your personal new year ❤️"},
 {date:"May 4", img:"photo2.jpg", song:"song2.mp3", msg:"May your cake be sweet and life sweeter 🎂"},
 {date:"May 5", img:"photo3.jpg", song:"song3.mp3", msg:"cheers to another trip around the sun 🌞"},
 {date:"May 6", img:"photo4.jpg", song:"song4.mp3", msg:"cheers to your life's annual milestone 💯"},
 {date:"May 7", img:"photo5.jpg", song:"song5.mp3", msg:"another 365 days journey begins enjoy 🥰"},
 {date:"May 8", img:"photo6.jpg", song:"song6.mp3", msg:"happies of day's to you 😁"},
 {date:"May 9", img:"photo7.jpg", song:"song7.mp3", msg:"celebrate your day to the fullest"},
 {date:"May 10", img:"photo8.jpg", song:"song8.mp3", msg:"Toast to another year of blessings 🙌🏻"},
 {date:"May 11", img:"photo9.jpg", song:"song9.mp3", msg:"May today be filled with sunshine and smiles 😊"},
 {date:"May 12", img:"photo10.jpg", song:"song10.mp3", msg:"Here's to another year of you 😝"}
];

function showToday(){
 let now=new Date();
 let start=new Date(`${YEAR}-05-03`);
 let diff=Math.floor((now-start)/(1000*60*60*24));

 if(diff>=daysData.length){
   showBirthday();
   return;
 }

 let day=daysData[diff];
 let card=document.getElementById("dayCard");

 card.innerHTML=`
  <h2>${day.date}</h2>
  <img src="${day.img}">
  <p id="typedText"></p>
  <button id="surpriseBtn">Tap for Surprise ❤️</button>
  <audio id="music">
    <source src="${day.song}" type="audio/mpeg">
  </audio>
 `;

 // TYPE
 let text=day.msg, i=0;
 function type(){
  if(i<text.length){
   document.getElementById("typedText").innerHTML+=text[i++];
   setTimeout(type,50);
  }
 }
 type();

 // MUSIC
 let music=document.getElementById("music");
 music.volume=0.3;
 music.play().catch(()=>{});

 // SURPRISE
 document.getElementById("surpriseBtn").onclick=()=>{
  confetti({particleCount:200});
 };

 // SECRET LONG PRESS
 card.onmousedown=()=>{
  setTimeout(()=>{
   document.getElementById("secret").style.display="block";
  },1000);
 };
 card.onmouseup=()=>{
  document.getElementById("secret").style.display="none";
 };
}

// COUNTDOWN
setInterval(()=>{
 let now=new Date();
 let end=new Date(`May 13, ${YEAR}`);
 let d=Math.ceil((end-now)/(1000*60*60*24));
 document.getElementById("countdown").innerText=d+" days are left ❤️";
},1000);

// FINAL
function showBirthday(){
 document.body.innerHTML=`
 <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center">
 <h1>Happy Birthday ❤️🎂</h1>
 <p>You are my everything 💖</p>
 </div>`;
 confetti({particleCount:400,spread:150});
}

// HEARTS
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerText="❤️";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},800);

</script>

</body>
</html>
