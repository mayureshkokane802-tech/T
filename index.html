<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 color:white;
 text-align:center;
 overflow:hidden;
 transition: background 1s;
}

/* VIDEO BACKGROUND */
video{
 position:fixed;
 inset:0;
 width:100%;
 height:100%;
 object-fit:cover;
 z-index:-2;
 opacity:0.3;
}

/* overlay glow */
body::after{
 content:"";
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.5);
 z-index:-1;
}

/* PASSWORD */
#lockScreen{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:1000;
}

/* PROGRESS BAR */
#progress{
 width:80%;
 height:8px;
 background:#444;
 margin:10px auto;
 border-radius:10px;
 overflow:hidden;
}
#progress div{
 height:100%;
 background:#ff2e63;
 width:0%;
}

/* CARD */
.day-card{
 padding:15px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(10px);
 animation:fade 1s ease;
}

@keyframes fade{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1;}
}

/* SLIDESHOW */
.slide{
 display:none;
 width:100%;
 border-radius:10px;
}
.slide.active{
 display:block;
}

/* FLOATING EMOJIS */
.emoji{
 position:fixed;
 bottom:-10px;
 font-size:20px;
 animation:float 6s linear infinite;
}
@keyframes float{
 to{transform:translateY(-100vh);}
}

/* BUTTON */
button{
 padding:10px;
 border:none;
 border-radius:10px;
 background:#ff2e63;
 color:white;
 margin-top:10px;
}
</style>
</head>

<body>

<!-- VIDEO BG -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-night-sky-1573/1080p.mp4" type="video/mp4">
</video>

<!-- PASSWORD -->
<div id="lockScreen">
<h2>Enter Password ❤️</h2>
<input type="password" id="password">
<button onclick="checkPassword()">Unlock</button>
</div>

<div id="main" style="display:none">
<h3 id="countdown"></h3>

<div id="progress"><div></div></div>

<div class="day-card" id="card"></div>
</div>

<script>

const pass="titishka123";
const YEAR=new Date().getFullYear();

function checkPassword(){
 if(document.getElementById("password").value===pass){
  document.getElementById("lockScreen").style.display="none";
  document.getElementById("main").style.display="block";
  showToday();
 }else alert("Wrong password 💔");
}

// DATA
const days=[
 {date:"May 3",imgs:["photo1.jpg","photo2.jpg"],song:"song1.mp3",msg:"cheers to your personal new year ❤️",color:"#ff758c"},
 {date:"May 4",imgs:["photo3.jpg","photo4.jpg"],song:"song2.mp3",msg:"May your cake be sweet 🎂",color:"#a18cd1"},
 {date:"May 5",imgs:["photo5.jpg","photo6.jpg"],song:"song3.mp3",msg:"another trip around sun 🌞",color:"#fbc2eb"},
 {date:"May 6",imgs:["photo7.jpg","photo8.jpg"],song:"song4.mp3",msg:"milestone 💯",color:"#fad0c4"},
 {date:"May 7",imgs:["photo9.jpg","photo10.jpg"],song:"song5.mp3",msg:"365 days joy 🥰",color:"#ffecd2"},
];

// MAIN
function showToday(){
 let now=new Date();
 let start=new Date(`${YEAR}-05-03`);
 let d=Math.floor((now-start)/(1000*60*60*24));

 if(d>=days.length){ birthday(); return; }

 let day=days[d];

 // THEME COLOR
 document.body.style.background=day.color;

 // PROGRESS
 document.querySelector("#progress div").style.width=((d+1)/days.length*100)+"%";

 let html=`<h2>${day.date}</h2>`;

 // SLIDESHOW
 day.imgs.forEach((img,i)=>{
  html+=`<img src="${img}" class="slide ${i==0?'active':''}">`;
 });

 html+=`
 <p>${day.msg}</p>
 <audio controls autoplay>
  <source src="${day.song}" type="audio/mpeg">
 </audio>
 <button onclick="confetti()">Tap Surprise 🎉</button>
 `;

 document.getElementById("card").innerHTML=html;

 startSlide();
}

// SLIDESHOW LOGIC
function startSlide(){
 let slides=document.querySelectorAll(".slide");
 let i=0;
 setInterval(()=>{
  slides.forEach(s=>s.classList.remove("active"));
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
 },2500);
}

// COUNTDOWN
setInterval(()=>{
 let now=new Date();
 let end=new Date(`May 13, ${YEAR}`);
 let d=Math.ceil((end-now)/(1000*60*60*24));
 document.getElementById("countdown").innerText=d+" days are left ❤️";
},1000);

// FLOATING EMOJIS
const emojis=["❤️","🎂","🎁","✨","🌸"];
setInterval(()=>{
 let e=document.createElement("div");
 e.className="emoji";
 e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
 e.style.left=Math.random()*100+"vw";
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),6000);
},800);

// FINAL DAY (CANDLE)
function birthday(){
 document.body.innerHTML=`
 <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center">
 <h1>Happy Birthday ❤️🎂</h1>
 <p>Tap the candle 🎂</p>
 <div id="cake" style="font-size:80px;cursor:pointer">🎂</div>
 </div>
 `;

 document.getElementById("cake").onclick=()=>{
  confetti({particleCount:300});
  document.getElementById("cake").innerText="🕯️✨";
 };
}

</script>

</body>
</html>
