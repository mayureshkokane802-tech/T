<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#ff758c,#ff7eb3);
 color:#fff;
 text-align:center;
}

header{
 position:fixed;
 top:0;
 width:100%;
 background:rgba(0,0,0,0.6);
 padding:12px;
}

.container{
 margin-top:80px;
 padding:10px;
}

.day-card{
 display:none;
 background:rgba(255,255,255,0.2);
 padding:15px;
 border-radius:15px;
 max-width:400px;
 margin:auto;
}

img{
 width:100%;
 border-radius:10px;
}

audio{
 width:100%;
 margin-top:10px;
}

#lockScreen{
 position:fixed;
 inset:0;
 background:black;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}
</style>
</head>
<body>

<div id="lockScreen">
<h2>Enter Password ❤️</h2>
<input type="password" id="password">
<button onclick="unlock()">Unlock</button>
</div>

<header>
<div id="countdown"></div>
</header>

<div class="container">
<div id="dayCard" class="day-card"></div>
</div>

<script>

const correctPassword = "titishkalikhe123";
const YEAR = new Date().getFullYear();

function unlock(){
 if(document.getElementById("password").value === correctPassword){
  document.getElementById("lockScreen").style.display = "none";
  showToday();
 } else {
  alert("Wrong password 💔");
 }
}

// DATA
const daysData = [
 {date:"May 3", img:"photo1.jpg", song:"song1.mp3", msg:"cheers to your personal new year ❤️"},
 {date:"May 4", img:"photo2.jpg", song:"song2.mp3", msg:"May your cake be sweet and life sweeter 🎂"},
 {date:"May 5", img:"photo3.jpg", song:"song3.mp3", msg:"cheers to another trip around the sun 🌞"},
 {date:"May 6", img:"photo4.jpg", song:"song4.mp3", msg:"cheers to your life's annual milestone 💯"},
 {date:"May 7", img:"photo5.jpg", song:"song5.mp3", msg:"another 365 days journey begins enjoy 🥰"},
 {date:"May 8", img:"photo6.jpg", song:"song6.mp3", msg:"happies of day's to you 😁"},
 {date:"May 9", img:"photo7.jpg", song:"song7.mp3", msg:"celebrate your day to the fullest"},
 {date:"May 10", img:"photo8.jpg", song:"song8.mp3", msg:"Toast to another year of blessings 🙌🏻"},
 {date:"May 11", img:"photo9.jpg", song:"song9.mp3", msg:"May today be filled with sunshine and smiles 😊"},
 {date:"May 12", img:"photo10.jpg", song:"song10.mp3", msg:"Here's to another year of you 😝"}
];

function showToday(){
 let now = new Date();
 let startDate = new Date(`${YEAR}-05-03T00:00:00`);

 let diff = Math.floor((now - startDate)/(1000*60*60*24));

 const card = document.getElementById("dayCard");

 if(diff < 0){
   card.innerHTML = "<h3>Wait... countdown started ❤️</h3>";
   card.style.display = "block";
   return;
 }

 if(diff >= daysData.length){
   showBirthday();
   return;
 }

 let day = daysData[diff];

 card.innerHTML = `
   <h2>${day.date}</h2>
   <img src="${day.img}" onerror="this.src='https://via.placeholder.com/400x300?text=Add+Photo'"/>
   <p>${day.msg}</p>
   <audio controls>
     <source src="${day.song}" type="audio/mpeg">
   </audio>
 `;

 card.style.display = "block";
}

// COUNTDOWN
const endDate = new Date(`May 13, ${YEAR}`);

setInterval(()=>{
 let now = new Date();
 let diff = Math.ceil((endDate-now)/(1000*60*60*24));
 document.getElementById("countdown").innerText =
 diff>0 ? diff + " days are left ❤️" : "0 days are left ❤️";
},1000);

// FINAL DAY
function showBirthday(){
 document.getElementById("dayCard").innerHTML = `
   <h1>Happy Birthday ❤️🎂</h1>
   <p>You are the best thing in my life 💖</p>
 `;
 confetti();
}

</script>

</body>
</html>
