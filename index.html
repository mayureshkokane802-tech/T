<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Her ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 color:white;
 text-align:center;
 overflow-x:hidden;
 overflow-y:auto;
}

/* BACKGROUND */
video{
 position:fixed;
 inset:0;
 width:100%;
 height:100%;
 object-fit:cover;
 z-index:-2;
 opacity:0.3;
}
body::after{
 content:"";
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.5);
 z-index:-1;
}

/* SCREENS */
#lockScreen,#surpriseScreen{
 position:fixed;
 inset:0;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:1000;
}
#lockScreen{background:black;}
#surpriseScreen{
 display:none;
 background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

#gift{
 font-size:80px;
 cursor:pointer;
 animation:bounce 1.5s infinite;
}

/* CARDS */
.day-card{
 padding:15px;
 border-radius:15px;
 max-width:400px;
 margin:15px auto;
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(10px);
}

.lock{opacity:0.7;}
.giftBox{
 font-size:40px;
 cursor:pointer;
 animation:bounce 1.5s infinite;
}

.single-img{
 width:100%;
 border-radius:15px;
 margin:10px 0;
}

.cake{font-size:50px;cursor:pointer;}

.teddy{
 position:fixed;
 bottom:10px;
 right:10px;
 font-size:40px;
 animation:bounce 2s infinite;
}

.emoji{
 position:fixed;
 bottom:-10px;
 animation:float 6s linear infinite;
}

/* ANIMATIONS */
@keyframes bounce{
 0%,100%{transform:translateY(0);}
 50%{transform:translateY(-10px);}
}
@keyframes float{
 to{transform:translateY(-100vh);}
}

canvas{border-radius:10px;}
button,input{
 padding:10px;
 border-radius:10px;
 border:none;
 margin:5px;
}
button{
 background:#ff2e63;
 color:white;
 width:100%;
}
</style>
</head>

<body>

<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-night-sky-1573/1080p.mp4">
</video>

<!-- PASSWORD -->
<div id="lockScreen">
<h2>Enter Password ❤️</h2>
<input type="password" id="password">
<button onclick="checkPassword()">Unlock</button>
</div>

<!-- SURPRISE -->
<div id="surpriseScreen">
<h2>Something for you ❤️</h2>
<p>Tap the gift 🎁</p>
<div id="gift">🎁</div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
<div id="card"></div>
</div>

<div class="teddy">🧸</div>

<script>

const pass="titishka123";
const YEAR=new Date().getFullYear();

// 🔐 SECRET CODES
const secretCodes=[
"love1","sweet2","cutie3","baby4","angel5",
"queen6","heart7","kiss8","forever9","mine10"
];

// 📅 DAYS (May 3 → May 12)
const days=[
 {date:"May 3",img:"photo1.jpg",song:"song1.mp3",msg:"You are my happiness ❤️"},
 {date:"May 4",img:"photo2.jpg",song:"song2.mp3",msg:"Stay sweet forever 🎂"},
 {date:"May 5",img:"photo3.jpg",song:"song3.mp3",msg:"My sunshine 🌞"},
 {date:"May 6",img:"photo4.jpg",song:"song4.mp3",msg:"You make my world beautiful 💖"},
 {date:"May 7",img:"photo5.jpg",song:"song5.mp3",msg:"Every moment with you matters 💫"},
 {date:"May 8",img:"photo6.jpg",song:"song6.mp3",msg:"You are my favorite person 🥰"},
 {date:"May 9",img:"photo7.jpg",song:"song7.mp3",msg:"My heart belongs to you ❤️"},
 {date:"May 10",img:"photo8.jpg",song:"song8.mp3",msg:"You complete me 💍"},
 {date:"May 11",img:"photo9.jpg",song:"song9.mp3",msg:"Forever isn’t enough with you 💞"},
 {date:"May 12",img:"photo10.jpg",song:"song10.mp3",msg:"One day before the most special day 💖"}
];

// PASSWORD
function checkPassword(){
 if(password.value===pass){
  lockScreen.style.display="none";
  surpriseScreen.style.display="flex";
 }else alert("Wrong password 💔");
}

// GIFT OPEN
gift.onclick=()=>{
 confetti({particleCount:200});
 gift.innerText="💝";
 setTimeout(()=>{
  surpriseScreen.style.display="none";
  main.style.display="block";
  showDays();
 },1000);
};

// MAIN LOGIC
function showDays(){
 let now=new Date();
 let start=new Date(`${YEAR}-05-03T00:00:00`);
 let birthday=new Date(`${YEAR}-05-13T00:00:00`);

 // 🎂 FINAL DAY
 if(now>=birthday){
  showBirthday();
  return;
 }

 let todayIndex=Math.floor((now-start)/(1000*60*60*24));

 let html="";

 days.forEach((day,i)=>{
  html+=`<div class="day-card"><h3>${day.date}</h3>`;

  let unlockDate=new Date(`${YEAR}-05-${String(i+3).padStart(2,'0')}T00:00:00`);

  if(now<unlockDate){
   html+=`
   <div class="lock">🔒 Locked</div>
   <div id="count${i}"></div>
   `;
  }
  else if(i===todayIndex){
   html+=`<div class="giftBox" onclick="askCode(${i})">🎁 Tap to open</div>`;
  }
  else{
   html+=getContent(day,i);
  }

  html+=`</div>`;
 });

 card.innerHTML=html;

 updateCountdowns();
 activateFeatures();
}

// SECRET CODE
function askCode(i){
 let user=prompt("Enter secret code 💌");

 if(user===secretCodes[i]){
  confetti({particleCount:200});
  document.querySelectorAll(".day-card")[i].innerHTML+=getContent(days[i],i);
  activateFeatures();
 }else alert("Wrong code 💔");
}

// CONTENT
function getContent(day,i){
 return `
 <img src="${day.img}" class="single-img">
 <p>${day.msg}</p>
 <div class="cake">🎂</div>
 <audio controls><source src="${day.song}"></audio>

 <p>Scratch for secret 💌</p>
 <canvas id="scratch${i}" width="300" height="100"></canvas>
 `;
}

// FEATURES
function activateFeatures(){
 document.querySelectorAll(".cake").forEach(c=>{
  c.onclick=()=>{
   confetti({particleCount:100});
   c.innerText="🍫🎂💖";
  };
 });

 document.querySelectorAll("canvas").forEach(c=>{
  scratch(c);
 });
}

// SCRATCH
function scratch(canvas){
 let ctx=canvas.getContext("2d");
 ctx.fillStyle="#999";
 ctx.fillRect(0,0,300,100);
 ctx.globalCompositeOperation="destination-out";

 let draw=false;
 canvas.onmousedown=()=>draw=true;
 canvas.onmouseup=()=>draw=false;

 canvas.onmousemove=(e)=>{
  if(!draw) return;
  let r=canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.arc(e.clientX-r.left,e.clientY-r.top,10,0,Math.PI*2);
  ctx.fill();
 };

 let text=document.createElement("div");
 text.innerText="I love you ❤️";
 text.style.marginTop="-80px";
 canvas.parentElement.appendChild(text);
}

// COUNTDOWN
function updateCountdowns(){
 setInterval(()=>{
  let now=new Date();

  days.forEach((d,i)=>{
   let el=document.getElementById("count"+i);
   if(!el) return;

   let target=new Date(`${YEAR}-05-${String(i+3).padStart(2,'0')}T00:00:00`);
   let diff=target-now;

   if(diff<=0){
    el.innerText="Unlocked ❤️";
   }else{
    let h=Math.floor(diff/1000/60/60);
    let m=Math.floor(diff/1000/60)%60;
    let s=Math.floor(diff/1000)%60;
    el.innerText=`${h}h ${m}m ${s}s left`;
   }
  });

 },1000);
}

// 🎂 FINAL BIRTHDAY SCREEN
function showBirthday(){
 document.body.innerHTML=`
 <div style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center">
 <h1>Happy Birthday My Love ❤️🎂</h1>
 <p>Tap the cake 🎂</p>
 <div id="cake" style="font-size:80px;cursor:pointer">🎂</div>
 </div>
 `;

 document.getElementById("cake").onclick=()=>{
  confetti({particleCount:400});
  document.getElementById("cake").innerText="🕯️✨💖";
 };
}

// FLOATING EMOJIS
const emojis=["❤️","🎂","🎁","✨","🌸","🧸"];
setInterval(()=>{
 let e=document.createElement("div");
 e.className="emoji";
 e.innerText=emojis[Math.floor(Math.random()*emojis.length)];
 e.style.left=Math.random()*100+"vw";
 document.body.appendChild(e);
 setTimeout(()=>e.remove(),6000);
},800);

</script>

</body>
</html>
